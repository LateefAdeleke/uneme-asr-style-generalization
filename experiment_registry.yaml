defaults:
  model_family: "whisper"
  transfer_condition: "no_transfer"
  random_seed: 42
  num_workers: 4
  save_predictions: true
  save_metrics_json: true
  save_per_utterance_outputs: true
  validate_audio_paths: true

models:
  whisper:
    model_type: "seq2seq"
    pretrained_model_name_or_path: "openai/whisper-small"
    processor_name_or_path: "openai/whisper-small"
    language: null
    task: "transcribe"
    freeze_encoder: false
    use_fp16: true

  wav2vec2_ctc:
    model_type: "ctc"
    pretrained_model_name_or_path: "facebook/wav2vec2-xls-r-300m"
    processor_name_or_path: "facebook/wav2vec2-xls-r-300m"
    use_fp16: true

transfer_setups:
  no_transfer:
    enabled: false
    source_checkpoint: null
    notes: "Train/fine-tune directly on target-language data only"

  cross_lingual_transfer:
    enabled: true
    source_checkpoint: "source_checkpoint: "results_whisper/yoruba_pretrain/checkpoint-3520""
    notes: "Initialize from cross-lingually adapted checkpoint before target-language fine-tuning"

training:
  output_root: "results"
  logging_root: "results/logs"
  evaluation_metric_for_best_model: "wer"
  greater_is_better: false
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 1
  num_train_epochs: 20
  save_total_limit: 2
  early_stopping_patience: 3
  evaluation_strategy: "epoch"
  save_strategy: "epoch"
  logging_strategy: "steps"
  logging_steps: 25

data:
  master_metadata_path: "data/metadata/master/metadata_with_all_splits_clean.csv"
  audio_path_column: "audio_path"
  text_column: "transcription_norm"
  utt_id_column: "utt_id"
  speaker_id_column: "speaker_id"
  session_id_column: "session_id"
  style_column: "style"
  style_bin_column: "style_bin"

reporting:
  aggregate_results_csv: "results/aggregate_results.csv"
  main_plot_path: "results/figures/main_comparison.png"
  transfer_plot_path: "results/figures/transfer_comparison.png"
  auxiliary_plot_path: "results/figures/auxiliary_comparison.png"